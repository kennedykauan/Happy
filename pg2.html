<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy - Cadastrar Orfanato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light min-vh-100">

    <div class="container-fluid p-0 d-flex justify-content-center align-items-center">
        <div class="row g-0">

            <aside
                class="col-12 col-md-1 bg-gradient-sidebar w-auto vh-md-100 p-4 d-flex flex-row flex-md-column justify-content-between align-items-center position-md-fixed top-0 start-0 z-3">
                <img src="img/Logo.png" alt="Happy Logo" class="img-fluid" style="max-height: 40px;">

                <a href="index.html" class="btn btn-info d-flex align-items-center justify-content-center text-white"
                    style="width: 48px; height: 48px; border-radius: 16px; background-color: #12AFCB; border: none;">
                    <i class="bi bi-arrow-left fs-5"></i>
                </a>
            </aside>

            <main class="col-12 col-md-11 offset-md-1 d-flex flex-column align-items-center py-5 px-3">

                <span class="text-secondary opacity-50 small fw-bold mb-4">Adicione um orfanato</span>

                <div class="card w-100 max-width-form p-4 p-sm-5 border-light-subtle shadow-sm"
                    style="border-radius: 20px;">
                    <form>

                        <fieldset class="mb-5 border-0 p-0">
                            <h2 class="h3 fw-bold mb-4 pb-2 border-bottom text-dark-emphasis">Dados</h2>

                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold mb-2">Anote no mapa a localização do
                                    orfanato</label>
                                <div class="position-relative overflow-hidden bg-body-secondary border rounded-4 d-flex align-items-center justify-content-center"
                                    style="height: 280px;">
                                    <img src="img/Mapa.png" alt="Mapa"
                                        class="img-fluid opacity-25 position-absolute" style="max-height: 180px;">

                                    <div class="position-absolute bg-warning d-flex align-items-center justify-content-center shadow-sm"
                                        style="width: 48px; height: 48px; border-radius: 16px;">
                                        <i class="bi bi-geo-alt-fill fs-4 text-info"></i>
                                    </div>

                                    <div
                                        class="position-absolute bottom-0 w-100 text-center py-3 fw-bold bg-body-tertiary border-top text-info small">
                                        Clique no mapa para adicionar a localização
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="name" class="form-label text-secondary fw-semibold">Nome</label>
                                <input type="text"
                                    class="form-control form-control-lg bg-body-tertiary border-light-subtle py-3"
                                    id="name" style="border-radius: 12px;">
                            </div>

                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label for="about" class="form-label text-secondary fw-semibold m-0">Sobre</label>
                                    <span class="text-secondary opacity-50 small">Máximo de 300 caracteres</span>
                                </div>
                                <textarea class="form-control bg-body-tertiary border-light-subtle py-3" id="about"
                                    rows="3" maxlength="300" style="border-radius: 12px;"></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="whatsapp" class="form-label text-secondary fw-semibold">Número de
                                    Whatsapp</label>
                                <input type="tel"
                                    class="form-control form-control-lg bg-body-tertiary border-light-subtle py-3"
                                    id="whatsapp" style="border-radius: 12px;">
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold mb-2">Fotos</label>
                                <div class="d-flex gap-2">
                                    <div class="d-flex align-items-center justify-content-center bg-body-tertiary border border-dashed rounded-4"
                                        style="width: 96px; height: 96px; border-style: dashed !important; border-color: #96D2F0 !important; cursor: pointer;">
                                        <i class="bi bi-plus-lg fs-3 text-success"></i>
                                    </div>
                                </div>
                            </div>
                        </fieldset>

                        <fieldset class="mb-4 border-0 p-0 pt-4 border-top">
                            <h2 class="h3 fw-bold mb-4 pb-2 text-dark-emphasis">Visitação</h2>

                            <div class="mb-4">
                                <label for="instructions"
                                    class="form-label text-secondary fw-semibold">Instruções</label>
                                <textarea class="form-control bg-body-tertiary border-light-subtle py-3"
                                    id="instructions" rows="3" style="border-radius: 12px;"></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="opening_hours" class="form-label text-secondary fw-semibold">Horário das
                                    visitas</label>
                                <input type="text"
                                    class="form-control form-control-lg bg-body-tertiary border-light-subtle py-3"
                                    id="opening_hours" style="border-radius: 12px;">
                            </div>

                            <div
                                class="mb-4 d-flex align-items-center justify-content-between p-3 bg-body-tertiary border border-light-subtle rounded-4">
                                <label class="form-check-label text-secondary fw-semibold m-0" for="weekend">Atende fim
                                    de semana?</label>
                                <div class="form-check form-switch p-0 m-0 d-flex align-items-center">
                                    <input class="form-check-input ms-0" type="checkbox" role="switch" id="weekend"
                                        style="width: 56px; height: 28px; cursor: pointer;">
                                </div>
                            </div>
                        </fieldset>

                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold fs-5 mt-4"
                            style="border-radius: 20px; background-color: #37C77F; border: none;">
                            Confirmar
                        </button>

                    </form>
                </div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
